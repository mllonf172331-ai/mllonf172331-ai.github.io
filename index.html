<!DOCTYPE html>
<html lang="th">

  <meta charset="UTF-8" />
  <title>ง้อน้องน้ำหวาน</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="card">
    <div class="heart">💗</div>
    <h1>เค้าขอโทษนะงับ</h1>
    <p class="subtitle">
      พี่รู้ว่าพี่ผิดพี่จะไม่ทำแบบเดิมอีกแล้ว<br />
      ให้โอกาสพี่ได้มั้ย
    </p>

    <div class="question">
      ยกโทษให้พี่ได้ไหมค้าบ?
    </div>

    <div class="buttons">
      <button id="yesBtn">Yes </button>
      <button id="noBtn">No </button>
    </div>



    <div class="message" id="message"></div>
  </div>

  <script src="script.js"></script>
</body>
</html>
